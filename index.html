<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="calculator">
        <div class="display">
            <p class="display-text"></p>
        </div>
        <div class="buttons-container">
            <div class="number-buttons">
                <div class="number-buttons-row">
                    <button>1</button>
                    <button>2</button>
                    <button>3</button>
                </div>
                <div class="number-buttons-row">
                    <button>4</button>
                    <button>5</button>
                    <button>6</button>
                </div>
                <div class="number-buttons-row">
                    <button>7</button>
                    <button>8</button>
                    <button>9</button>
                </div>
                <div class="number-buttons-row">
                    <button>0</button>
                </div>
            </div>
            <div class="operator-buttons">
                <div class="operator-buttons-row">
                    <button>+</button>
                    <button>-</button>
                </div>
                <div class="operator-buttons-row">
                    <button>/</button>
                    <button>*</button>
                </div>
                <div class="operator-buttons-row">
                    <button>=</button>
                    <button>clear</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
